# mnemon ingestion config.
# Markets are NOT listed here: at every run the tracked market set is derived
# from the current allocations of the vaults below (plus extra_markets).

# All relative paths are resolved against this file's directory.
data_dir: data

chains:
  - chain_id: 999
    name: hyperevm
    # coins.llama.fi coin-key prefix, i.e. "hyperliquid:0x...".
    llama_slug: hyperliquid
    # yields.llama.fi "chain" field for this network.
    yields_chain: "Hyperliquid L1"
    # Free public RPC — used ONLY as a view-call fallback when the Morpho API
    # has no state for a tracked market. No log indexing, no backfills.
    rpc_url: https://rpc.hyperliquid.xyz/evm
    # Morpho Blue core contract (from the API's morphoBlues query).
    morpho_blue: "0x68e37dE8d93d3496ae143F2E900490f6280C57cD"

vaults:
  - address: "0x4DC97f968B0Ba4Edd32D1b9B8Aaf54776c134d42"
    chain_id: 999
    label: myrmidons-usdt0
  - address: "0x889d35426F44A06EE89adF1eC4E5A4C9EB50a4f1"
    chain_id: 999
    label: myrmidons-whype

# Markets to track beyond what the vaults allocate into.
# extra_markets:
#   - chain_id: 999
#     market_id: "0x..."
extra_markets: []

# Morpho Vault V2 vaults (vaultV2* API entities; used by vault_v2_state/_flows).
v2_vaults:
  - address: "0xB851D568d123077E787860a34da286255249d983"
    chain_id: 999
    label: myrmidons-usdt0-v2

# HEGEMON V2 bot JSONL event sink (bind mount on the shared VPS host).
# Absent/missing dir => bot_events job no-ops (fine for local dev).
hegemon_event_dir: /home/ubuntu/HEGEMON_V2/data/events

# Where the `export` job writes FE-facing JSON snapshots. Defaults to
# <data_dir>/export (i.e. ~/mnemon/data/export on the VPS), which Caddy serves
# at data.myrmidons-strategies.com. Uncomment to override.
# export_dir: data/export

# Job cadences in seconds. `python -m mnemon run` (cron every 15 min) runs
# whichever jobs are due according to the last-success time in the state file.
# NOTE: nothing can run more often than the scheduler fires — the systemd
# timer (systemd/mnemon.timer) ticks every 5 minutes; cron users should match.
cadences:
  market_state: 300
  prices: 900
  vault_allocations: 900
  bot_events: 900
  vault_v2_state: 3600
  vault_v2_flows: 3600
  # Full borrower book, hourly. Finer position tracking for near-liquidation
  # monitoring belongs in the consumer's own live loop, not the archive.
  positions: 3600
  markets: 86400
  # yields.llama.fi/pools is one multi-MB dump — 4x/day is polite.
  yield_pools: 21600
  # Daily gap-repair: re-pulls recent hourly history and inserts only missing
  # buckets, so upstream API outages don't leave permanent holes.
  heal: 86400
  # FE JSON snapshots (market_health.json, util_spells.json) for the website's
  # tools section. Written to export_dir (default <data_dir>/export), served
  # statically by Caddy at data.myrmidons-strategies.com.
  export: 900

# Lookback window (hours) for the heal job. Must exceed the longest outage
# you want auto-recovered; `python -m mnemon heal --hours N` overrides it.
heal_lookback_hours: 48

http:
  # Minimum delay between any two outgoing requests (shared across all APIs).
  min_interval_ms: 300
  timeout_s: 30
  max_retries: 5

# Safety cap on position pagination (100 positions per page, per market).
positions_max_pages: 50
